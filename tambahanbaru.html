<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanjutan Halaman</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #2575fc, #6a11cb);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
        }

        .highlight {
            color: #ffeb3b;
            font-weight: bold;
        }

        .button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4caf50;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .button:hover {
            background-color: #388e3c;
        }
    </style>
</head>
<body>
    <h1>Lanjutan <span class="highlight">Halaman!</span></h1>
    <p>Ini halaman selanjutnya yang terhubung dengan halaman sebelumnya.</p>
    <button class="button" onclick="window.location.href='tambahanbaru.html'">Kembali ke Hallo Collaborator</button>
</body>
</html>
