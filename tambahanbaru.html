<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallo Collaborator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
        }

        .highlight {
            color: #ffeb3b;
            font-weight: bold;
        }

        .button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #ff4081;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .button:hover {
            background-color: #e91e63;
        }
    </style>
</head>
<body>
    <h1>Hallo <span class="highlight">Collaborator!</span></h1>
    <p>Selamat datang di project kita. Semangat coding 💻🔥</p>
    <button class="button" onclick="alert('Semangat bekerja tim!')">Klik Saya</button>
    <button class="button" onclick="window.location.href='lanjutan.html'">Lanjut ke Halaman Berikutnya</button>
</body>
</html>
